name: Fetch GeM Tenders

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-gem:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test GeM connectivity
        continue-on-error: true
        run: |
          curl -I --max-time 30 "https://bidplus.gem.gov.in/advance-search" || echo "GeM may block GitHub cloud servers"

      - name: Fetch GeM Korba bids
        continue-on-error: true
        id: fetch
        env:
          PYTHONUNBUFFERED: "1"
        run: python run_gem.py --export-json

      - name: Commit updated GeM data
        if: steps.fetch.outcome == 'success'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update GeM tender data [skip ci]"
          file_pattern: docs/data/gem-tenders.json
          skip_dirty_check: true

      - name: Local fetch required
        if: steps.fetch.outcome != 'success'
        run: |
          echo "::warning::GeM blocked this GitHub runner (connection refused)."
          echo "Run locally instead: python run_gem.py --export-json"
          echo "Or use: .\\run_gem_and_push.ps1"
          exit 1
